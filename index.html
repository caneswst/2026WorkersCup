            try {

                const data = await response.json();
                cloudDataCache = data.record || {};

                for (let f of ['321', '312', '231']) {
                    if (!cloudDataCache.formations[f]) cloudDataCache.formations[f] = { players: {}, coords: {} };
                }
                if (!cloudDataCache.video) cloudDataCache.video = { title: '', url: '' };
                if (cloudDataCache.imageBase64 === undefined) cloudDataCache.imageBase64 = '';

                currentFormation = cloudDataCache.currentFormation || '321';
                formationSelect.value = currentFormation;
                selectedPlayers = { ...cloudDataCache.formations[currentFormation].players };
                positionsPercent = { ...cloudDataCache.formations[currentFormation].coords };

                const layout = formations[currentFormation].layout;
                for (let pos of formations[currentFormation].positions) {
                    if (!positionsPercent[pos] || typeof positionsPercent[pos].percentX !== 'number') {
                        positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
                    }
                }

                updateVideoUI(cloudDataCache.video.title, cloudDataCache.video.url);
                updateImageUI(cloudDataCache.imageBase64);
                rebuildUI();
                syncStatusSpan.textContent = '✅ 已同步雲端';
            } catch (err) {
                console.error('載入失敗', err);
                syncStatusSpan.textContent = '⚠️ 無法連線雲端，使用本地模式';

                for (let pos of formations[currentFormation].positions) {
                    positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
                }
                selectedPlayers = {};
                cloudDataCache = cloudDataCache || { formations: {}, video: { title: '', url: '' }, imageBase64: '' };
                rebuildUI();
            }
        }

        async function saveToCloud() {
            if (isRemoteUpdate || !cloudDataCache) return;
            cloudDataCache.currentFormation = currentFormation;
            cloudDataCache.formations[currentFormation] = { players: selectedPlayers, coords: positionsPercent };
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(cloudDataCache)
                });
                syncStatusSpan.textContent = '✅ 已儲存';
                setTimeout(() => { if (syncStatusSpan.textContent === '✅ 已儲存') syncStatusSpan.textContent = '✅ 已同步雲端'; }, 1500);
