<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>傲翔2026戰術板｜工人盃(7人) + 丙組(11人) 雙名單</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            display: flex;
            flex-direction: column;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #e8ecef, #f5f7fa);
            color: #333;
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* 全局預設球員樣式 (工人盃) */
        .player {
            position: absolute;
            background: #4682b4;  /* 工人盃深藍色 */
            border-radius: 50%;
            color: #fff;
            text-align: center;
            cursor: grab;
            transition: box-shadow 0.2s, transform 0.1s;
            transform: translate(-50%, -50%);
            will-change: left, top;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,240,0.7);
            font-weight: bold;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            padding: 0 2px;
        }
        .player:active {
            cursor: grabbing;
        }
        .player.dragging {
            opacity: 0.85;
            cursor: grabbing;
            z-index: 100;
            transition: none;
        }
        /* 丙組專用樣式 (淺紫色 + 稍大尺寸) */
        body.roster-reserve .player {
            background: #b39ddb;      /* 淺紫色 */
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            border: 1px solid #e0c3ff;
            width: clamp(24px, 3.2vw, 38px);
            height: clamp(24px, 3.2vw, 38px);
            line-height: clamp(24px, 3.2vw, 38px);
            font-size: clamp(10px, 1.3vw, 13px);
        }
        /* 工人盃原有尺寸 (較大) */
        body.roster-workers .player {
            width: clamp(37.5px, 5.25vw, 60px);
            height: clamp(37.5px, 5.25vw, 60px);
            line-height: clamp(37.5px, 5.25vw, 60px);
            font-size: clamp(12px, 2.25vw, 21px);
        }

        #header {
            text-align: center;
            padding: 2vh 0;
            background: linear-gradient(90deg, #1e5a3a, #2c7a47);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
        }
        #header h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(24px, 5vw, 36px);
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .layout-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
        }
        .layout-btn {
            background: #2c7a47;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .layout-btn.active {
            background: #f4c542;
            color: #2c3e2f;
        }
        .roster-switch-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 6px 0 12px 0;
            background: rgba(44,122,71,0.15);
            padding: 8px;
            border-radius: 40px;
        }
        .roster-btn {
            background: #e0e7ff;
            border: none;
            color: #1e3a5f;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }
        .roster-btn.active {
            background: #2e8b57;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .container {
            display: flex;
            flex-wrap: nowrap;
            padding: 1vw;
            width: 100%;
            margin: 0;
            gap: 1vw;
            flex-grow: 1;
            align-items: stretch;
        }
        #pitch-container {
            flex: 0 0 28%;
            position: relative;
            background: url('https://raw.githubusercontent.com/caneswst/Falcon352/refs/heads/main/football_pitch.jpg') no-repeat center;
            background-size: cover;
            min-height: 200px;
            aspect-ratio: 3 / 5;
            border: 2px solid #f4c542;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
            background-color: #2e8b57;
            overflow: hidden;
        }
        #left-panel, #subs-container, #right-panel {
            flex: 1 1 18%;
            padding: 1vw;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            min-width: 200px;
        }
        select {
            width: 100%;
            padding: clamp(4px, 1vw, 6px);
            margin-bottom: clamp(6px, 1vw, 8px);
            border-radius: 5px;
            background: #fff;
            color: #333;
            border: 1px solid #2c7a47;
            font-size: clamp(10px, 1.5vw, 12px);
        }
        h2, h3 {
            color: #1e5a3a;
            font-family: 'Bebas Neue', cursive;
            margin: clamp(4px, 1vw, 5px) 0;
            font-size: clamp(16px, 2vw, 20px);
        }
        .position-info {
            display: none;
            line-height: 1.5;
            background: rgba(44,122,71,0.1);
            padding: clamp(6px, 1vw, 8px);
            border-radius: 5px;
            margin-bottom: clamp(6px, 1vw, 8px);
        }
        .position-info p {
            margin: clamp(3px, 0.5vw, 4px) 0;
            font-size: clamp(10px, 1.5vw, 12px);
        }
        .position-info strong {
            color: #d4451e;
        }
        #formation-select {
            width: 100%;
            padding: clamp(6px, 1vw, 8px);
            margin-bottom: clamp(8px, 1.5vw, 10px);
            font-size: clamp(12px, 1.8vw, 14px);
            background: #1e5a3a;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #formation-select:hover {
            background: #f4c542;
            color: #1e3a2f;
        }
        .sync-status {
            font-size: 12px;
            margin-top: 10px;
            padding: 4px;
            background: #eee;
            border-radius: 4px;
            text-align: center;
        }
        .share-section {
            margin-top: 20px;
            padding: 12px 10px;
            background: #f0f7f0;
            border-radius: 12px;
            border-left: 5px solid #ff0000;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input-row input, .input-row button {
            flex: 1;
            padding: 8px 10px;
            border-radius: 25px;
            border: 1px solid #ccc;
            font-size: 13px;
            background: white;
            user-select: text;
        }
        .input-row button {
            background: #2e8b57;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            flex: 0 0 auto;
        }
        .video-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .video-item {
            background: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            border: 1px solid #ddd;
        }
        .video-actions button, .video-actions a {
            background: #4682b4;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }
        .video-actions .delete-btn {
            background: #dc3545;
        }

        /* 響應式佈局 (保持與原有相同) */
        body.force-mobile .container { flex-direction: column; padding: 2vw; }
        body.force-mobile #pitch-container { width: 100%; min-height: 50vh; max-height: 400px; flex: none; }
        body.force-mobile .player { width: 9vw; height: 9vw; line-height: 9vw; font-size: 3vw; }

        body.force-desktop .container { flex-direction: row; flex-wrap: nowrap; }
        body.force-desktop #pitch-container { flex: 0 0 28%; }

        @media (max-width: 900px) {
            body:not(.force-desktop):not(.force-mobile) .container { flex-wrap: wrap; }
            body:not(.force-desktop):not(.force-mobile) #pitch-container { flex: 0 0 70%; }
        }
        @media (max-width: 600px) {
            body:not(.force-desktop):not(.force-mobile) .container { flex-direction: column; }
            body:not(.force-desktop):not(.force-mobile) .player { width: 9vw; height: 9vw; line-height: 9vw; font-size: 3vw; }
        }
    </style>
</head>

    function makeDraggable(el, posKey) {
        let startX, startY, startLeft, startTop, dragging = false, moved = false;
        const container = pitchContainer;
        const onMove = (e) => {
            if (!dragging) return;
            e.preventDefault();
            let cx = e.clientX ?? (e.touches?.[0]?.clientX ?? 0);
            let cy = e.clientY ?? (e.touches?.[0]?.clientY ?? 0);
            let dx = cx - startX, dy = cy - startY;
            if (!moved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) moved = true;
            if (moved) {
                let nl = startLeft + dx, nt = startTop + dy;
                let maxX = container.clientWidth - el.clientWidth;
                let maxY = container.clientHeight - el.clientHeight;
                nl = Math.min(Math.max(0, nl), maxX);
                nt = Math.min(Math.max(0, nt), maxY);
                el.style.left = nl + 'px';
                el.style.top = nt + 'px';
            }
        };
        const onUp = () => {
            if (dragging) {
                dragging = false;
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('touchend', onUp);
                if (moved) {
                    let leftPx = parseFloat(el.style.left), topPx = parseFloat(el.style.top);
                    if (!isNaN(leftPx)) {
                        let { percentX, percentY } = pixelsToPercent(leftPx, topPx);
                        updatePositionToCloud(posKey, percentX, percentY);
                    }
                } else showPositionDetails(posKey);
                moved = false;
            }
        };
        const onDown = (e) => {
            e.preventDefault();
            let cx = e.clientX ?? (e.touches?.[0]?.clientX ?? 0);
            let cy = e.clientY ?? (e.touches?.[0]?.clientY ?? 0);
            startX = cx; startY = cy;
            let rect = el.getBoundingClientRect(), cRect = container.getBoundingClientRect();
            startLeft = rect.left - cRect.left;
            startTop = rect.top - cRect.top;
            dragging = true;
            moved = false;
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onUp);
            el.classList.add('dragging');
        };
        el.addEventListener('mousedown', onDown);
        el.addEventListener('touchstart', onDown, { passive: false });
    }

        selectedPlayers = {};
        for (let pos of currentFormations[currentFormationKey].positions) {
            if (oldSelected[pos]) selectedPlayers[pos] = oldSelected[pos];
        }
        autoFillPositions();
        saveToCloud();
        rebuildUI();
    }

    // 影片管理
    function renderVideoList(videos) {
        if (!videos || videos.length === 0) { videoListContainer.innerHTML = '<div>📭 暫無影片</div>'; return; }
        let sorted = [...videos].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        videoListContainer.innerHTML = sorted.map((v, idx) => {
            let originalIdx = videos.indexOf(v);
            return `<div class="video-item"><div><b>${escapeHtml(v.title || '影片')}</b><br><span>${escapeHtml(v.url)}</span></div><div class="video-actions"><a href="${escapeHtml(v.url)}" target="_blank">▶播放</a><button class="delete-video" data-idx="${originalIdx}">刪除</button></div></div>`;
        }).join('');
        document.querySelectorAll('.delete-video').forEach(btn => btn.addEventListener('click', async (e) => {
            let idx = parseInt(btn.dataset.idx);
            if (!isNaN(idx) && cloudDataCache.videos[idx]) {
                cloudDataCache.videos.splice(idx, 1);
                await saveToCloud();
                renderVideoList(cloudDataCache.videos);
            }
        }));
    }
    async function addVideo() {
        if (!cloudDataCache) return;
        let title = videoTitleInput.value.trim();
        let url = videoUrlInput.value.trim();
        if (!url) return alert('請輸入連結');
        cloudDataCache.videos.push({ title, url, timestamp: Date.now() });
        await saveToCloud();
        renderVideoList(cloudDataCache.videos);
        videoTitleInput.value = '';
        videoUrlInput.value = '';
    }

    // 雲端載入
    async function loadFromCloud() {
        syncStatusSpan.textContent = '📡 載入中...';
        try {
            const response = await fetch(API_URL, { headers: { 'X-Master-Key': API_KEY } });
            const data = await response.json();
            cloudDataCache = data.record || {};
            if (!cloudDataCache.rosters) cloudDataCache.rosters = { workers: {}, reserve: {} };
            if (!cloudDataCache.videos) cloudDataCache.videos = [];
            cloudDataCache.videos = cloudDataCache.videos.filter(v => v && v.url);

            // 決定默認名單
            if (cloudDataCache.currentRoster) currentRoster = cloudDataCache.currentRoster;
            else currentRoster = 'workers';
            if (currentRoster === 'workers') {
                currentFormations = sevenFormations;
                activePlayers = [...WORKERS_CUP_PLAYERS];
                document.body.classList.add('roster-workers');
                formationSelect.innerHTML = '<option value="321">3-2-1</option><option value="312">3-1-2</option><option value="231">2-3-1</option>';
            } else {
                currentFormations = elevenFormations;
                activePlayers = [...CUP_2026_PLAYERS];
                document.body.classList.add('roster-reserve');
                formationSelect.innerHTML = '<option value="442">4-4-2 (平行)</option><option value="4231">4-2-3-1 (雙防中)</option><option value="451">4-5-1 (穩守)</option>';
            }
            const rosterData = cloudDataCache.rosters[currentRoster];
            currentFormationKey = rosterData?.currentFormation || (currentRoster==='workers'?'321':'442');
            if (!currentFormations[currentFormationKey]) currentFormationKey = Object.keys(currentFormations)[0];
            formationSelect.value = currentFormationKey;
            const formData = rosterData?.formations?.[currentFormationKey];
            if (formData && formData.players) {
                selectedPlayers = { ...formData.players };
                positionsPercent = { ...formData.coords };
            } else {
                selectedPlayers = {};
                positionsPercent = {};
                const layout = currentFormations[currentFormationKey].layout;
                for (let pos of currentFormations[currentFormationKey].positions) {
                    positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
                }
            }
            autoFillPositions();
            renderVideoList(cloudDataCache.videos);
            rebuildUI();
            syncStatusSpan.textContent = '✅ 已同步雲端';
        } catch (err) {
            console.warn('雲端載入失敗，使用本地模式', err);
            cloudDataCache = { rosters: { workers: {}, reserve: {} }, videos: [] };
            if (currentRoster === 'workers') {
                currentFormations = sevenFormations;
                activePlayers = [...WORKERS_CUP_PLAYERS];
                document.body.classList.add('roster-workers');
                formationSelect.innerHTML = '<option value="321">3-2-1</option><option value="312">3-1-2</option><option value="231">2-3-1</option>';
                currentFormationKey = '321';
            } else {
                currentFormations = elevenFormations;
                activePlayers = [...CUP_2026_PLAYERS];
                document.body.classList.add('roster-reserve');
                formationSelect.innerHTML = '<option value="442">4-4-2</option><option value="4231">4-2-3-1</option><option value="451">4-5-1</option>';
                currentFormationKey = '442';
            }
            formationSelect.value = currentFormationKey;
            const layout = currentFormations[currentFormationKey].layout;
            for (let pos of currentFormations[currentFormationKey].positions) positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
            selectedPlayers = {};
            autoFillPositions();
            rebuildUI();
        }
    }

    // 版面切換
    function setLayoutMode(mode) {
        document.body.classList.remove('force-mobile', 'force-desktop');
        if (mode === 'mobile') document.body.classList.add('force-mobile');
        else if (mode === 'desktop') document.body.classList.add('force-desktop');
        localStorage.setItem('layoutMode', mode);
        ['auto', 'mobile', 'desktop'].forEach(id => document.getElementById(`btn-${id}`).classList.toggle('active', mode === id));
        setTimeout(() => { if (pitchContainer) rebuildUI(); }, 30);
    }

    // 事件綁定
    formationSelect.onchange = () => updateFormation(formationSelect.value);
    document.getElementById('btn-auto').addEventListener('click', () => setLayoutMode('auto'));
    document.getElementById('btn-mobile').addEventListener('click', () => setLayoutMode('mobile'));
    document.getElementById('btn-desktop').addEventListener('click', () => setLayoutMode('desktop'));
    addVideoBtn.addEventListener('click', addVideo);
    rosterWorkersBtn.addEventListener('click', () => switchRoster('workers'));
    rosterReserveBtn.addEventListener('click', () => switchRoster('reserve'));

    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { if (pitchContainer) rebuildUI(); }, 100);
    });

    setLayoutMode(localStorage.getItem('layoutMode') || 'auto');
    loadFromCloud();
</script>
</body>
</html>
