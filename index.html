<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>傲翔2026工人盃戰術板 (雲端同步)</title>
    <style>
        /* 此處樣式與先前相同，因篇幅省略，實際使用時請從上方複製完整樣式 */
        /* 為保持完整性，請使用您原有的樣式，此處暫不重複 */
    </style>
</head>
<body>
    <!-- HTML 結構與之前完全相同，此處略，實際使用時請從上方複製完整結構 -->
    <script>
        // ====================  JSONBin 設定  ====================
        const BIN_ID = "69c0ae30c3097a1dd54ddd0b";
        const API_KEY = "$2a$10$hpvWSVZz6NSxFP/yY6srDu8yQJTtPj61BZk1o3VOoSgYh7AWGHri2";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // 球員名單
        const players = ['禮', '新', 'Mike', 'Dan', '東', '軍c', 'Xander', 'Alex', '光', 'Frankie', 'Ivan', 'Vasco', '曹', 'Gary'];

        // ---------- 完整陣型定義（與先前相同，此處略，實際使用時請從上方複製完整 formations）----------
        const formations = {
            // 請確保此處的 formations 內容與先前完全一致，此處僅佔位符
            '321': { positions: [], layout: {}, details: {} },
            '312': { positions: [], layout: {}, details: {} },
            '231': { positions: [], layout: {}, details: {} }
        };
        // 請將您原有的完整 formations 定義複製到此處，否則戰術說明會遺失

        // 全域變數
        let currentFormation = '321';
        let selectedPlayers = {};
        let positionsPercent = {};
        let isRemoteUpdate = false;
        let cloudDataCache = null;
        let resizeObserver = null;  // 用於視窗大小變化時重新定位

        // DOM 元素
        const formationSelect = document.getElementById('formation-select');
        const pitchContainer = document.getElementById('pitch-container');
        const positionsContainer = document.getElementById('positions-container');
        const subsListDiv = document.getElementById('subs-list');
        const positionDetailsDiv = document.getElementById('position-details');
        const syncStatusSpan = document.getElementById('sync-status');

        // ---------- 輔助函數 ----------
        function percentToPixels(percentX, percentY, container) {
            const left = (percentX / 100) * container.clientWidth;
            const top = (percentY / 100) * container.clientHeight;
            return { left, top };
        }

        function pixelsToPercent(leftPx, topPx, container) {
            const percentX = (leftPx / container.clientWidth) * 100;
            const percentY = (topPx / container.clientHeight) * 100;
            return { percentX, percentY };
        }

        // ---------- 雲端讀寫 ----------
        async function loadFromCloud() {
            syncStatusSpan.textContent = '📡 載入中...';
            try {
                const response = await fetch(API_URL, { headers: { 'X-Master-Key': API_KEY } });
                const data = await response.json();
                cloudDataCache = data.record;

                for (let f of ['321', '312', '231']) {
                    if (!cloudDataCache.formations[f]) cloudDataCache.formations[f] = { players: {}, coords: {} };
                }

                currentFormation = cloudDataCache.currentFormation || '321';
                formationSelect.value = currentFormation;
                selectedPlayers = { ...cloudDataCache.formations[currentFormation].players };
                positionsPercent = { ...cloudDataCache.formations[currentFormation].coords };

                rebuildUI();
                syncStatusSpan.textContent = '✅ 已同步雲端';
            } catch (err) {
                console.error('載入失敗', err);
                syncStatusSpan.textContent = '⚠️ 無法連線雲端，使用本地模式';
                selectedPlayers = {};
                positionsPercent = {};
                rebuildUI();
            }
        }

        async function saveToCloud() {
            if (isRemoteUpdate || !cloudDataCache) return;
            cloudDataCache.currentFormation = currentFormation;
            cloudDataCache.formations[currentFormation].players = selectedPlayers;
            cloudDataCache.formations[currentFormation].coords = positionsPercent;

            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(cloudDataCache)
                });
                syncStatusSpan.textContent = '✅ 已儲存';
                setTimeout(() => {
                    if (syncStatusSpan.textContent === '✅ 已儲存') syncStatusSpan.textContent = '✅ 已同步雲端';
                }, 1500);
            } catch (err) {
                console.error('儲存失敗', err);
                syncStatusSpan.textContent = '❌ 儲存失敗';
            }
        }

        function updatePositionToCloud(pos, percentX, percentY) {
            positionsPercent[pos] = { percentX, percentY };
            saveToCloud();
        }

        function updatePlayerToCloud(pos, playerName) {
            selectedPlayers[pos] = playerName;
            saveToCloud();
        }

        function updateFormationToCloud(formationKey) {
            currentFormation = formationKey;
            if (cloudDataCache && cloudDataCache.formations[formationKey]) {
                selectedPlayers = { ...cloudDataCache.formations[formationKey].players };
                positionsPercent = { ...cloudDataCache.formations[formationKey].coords };
            } else {
                selectedPlayers = {};
                positionsPercent = {};
            }
            saveToCloud();
            rebuildUI();
        }

        // ---------- UI 建構與拖曳 ----------
        function makeDraggable(element, posKey) {
            let startX = 0, startY = 0;
            let startLeft = 0, startTop = 0;
            let isDragging = false;
            let dragStarted = false;
            let hasMoved = false;
            const container = pitchContainer;

            function onPointerDown(e) {
                e.preventDefault();
                e.stopPropagation();
                const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                startX = clientX;
                startY = clientY;
                const rect = element.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                startLeft = rect.left - containerRect.left;
                startTop = rect.top - containerRect.top;
                element.style.left = startLeft + 'px';
                element.style.top = startTop + 'px';
                isDragging = true;
                dragStarted = false;
                hasMoved = false;
                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);
                window.addEventListener('touchmove', onPointerMove, { passive: false });
                window.addEventListener('touchend', onPointerUp);
                window.addEventListener('touchcancel', onPointerUp);
                element.classList.add('dragging');
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                const dx = clientX - startX;
                const dy = clientY - startY;
                if (!dragStarted && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
                    dragStarted = true;
                    hasMoved = true;
                }
                if (dragStarted) {
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;
                    const containerRect = container.getBoundingClientRect();
                    const elemRect = element.getBoundingClientRect();
                    const maxLeft = containerRect.width - elemRect.width;
                    const maxTop = containerRect.height - elemRect.height;
                    newLeft = Math.min(Math.max(0, newLeft), maxLeft);
                    newTop = Math.min(Math.max(0, newTop), maxTop);
                    element.style.left = newLeft + 'px';
                    element.style.top = newTop + 'px';
                }
            }

            function onPointerUp() {
                if (!isDragging) return;
                isDragging = false;
                element.classList.remove('dragging');
                window.removeEventListener('mousemove', onPointerMove);
                window.removeEventListener('mouseup', onPointerUp);
                window.removeEventListener('touchmove', onPointerMove);
                window.removeEventListener('touchend', onPointerUp);
                window.removeEventListener('touchcancel', onPointerUp);
                if (hasMoved) {
                    const newLeft = parseFloat(element.style.left);
                    const newTop = parseFloat(element.style.top);
                    if (!isNaN(newLeft) && !isNaN(newTop)) {
                        const containerRect = pitchContainer.getBoundingClientRect();
                        const { percentX, percentY } = pixelsToPercent(newLeft, newTop, containerRect);
                        updatePositionToCloud(posKey, percentX, percentY);
                    }
                } else {
                    showPositionDetails(posKey);
                }
                hasMoved = false;
                dragStarted = false;
            }

            element.addEventListener('mousedown', onPointerDown);
            element.addEventListener('touchstart', onPointerDown, { passive: false });
        }

        // 重新計算所有圖示的位置（不重建 DOM，僅更新 left/top）
        function repositionAllPlayers() {
            const formation = formations[currentFormation];
            if (!formation) return;

            formation.positions.forEach(pos => {
                const playerDiv = document.getElementById(`${pos}-player`);
                if (!playerDiv) return;

                let percentX, percentY;
                if (positionsPercent[pos] && positionsPercent[pos].percentX !== undefined) {
                    percentX = positionsPercent[pos].percentX;
                    percentY = positionsPercent[pos].percentY;
                } else {
                    // 使用預設百分比
                    const layout = formation.layout[pos];
                    percentX = parseFloat(layout.left);
                    percentY = parseFloat(layout.top);
                    positionsPercent[pos] = { percentX, percentY };
                }

                // 確保容器有有效尺寸
                if (pitchContainer.clientWidth > 0 && pitchContainer.clientHeight > 0) {
                    const { left, top } = percentToPixels(percentX, percentY, pitchContainer);
                    playerDiv.style.left = left + 'px';
                    playerDiv.style.top = top + 'px';
                }
            });
        }

        function rebuildUI() {
            const formation = formations[currentFormation];
            if (!formation) return;

            // 左側下拉選單
            positionsContainer.innerHTML = '';
            formation.positions.forEach(pos => {
                const label = document.createElement('label');
                label.textContent = formation.details[pos].name + ':';
                const select = document.createElement('select');
                select.id = pos;
                select.innerHTML = '<option value="">選擇球員</option>' + players.map(p => `<option value="${p}">${p}</option>`).join('');
                if (selectedPlayers[pos]) select.value = selectedPlayers[pos];
                select.onchange = (e) => {
                    const newVal = e.target.value;
                    selectedPlayers[pos] = newVal;
                    updatePlayerToCloud(pos, newVal);
                    updatePitchAndSubs();
                };
                positionsContainer.appendChild(label);
                positionsContainer.appendChild(select);
            });

            // 重新建立球場圖示（先清空）
            pitchContainer.innerHTML = '<div id="pitch-error" style="display: none;">無法加載足球場圖片</div>';

            // 先創建所有圖示元素，但暫不設置位置（避免容器尺寸未定）
            formation.positions.forEach(pos => {
                const playerDiv = document.createElement('div');
                playerDiv.className = 'player';
                playerDiv.id = `${pos}-player`;
                playerDiv.textContent = selectedPlayers[pos] || pos.toUpperCase();
                pitchContainer.appendChild(playerDiv);
            });

            // 等待 DOM 渲染完成後再計算位置（確保容器已有正確尺寸）
            requestAnimationFrame(() => {
                // 如果容器尺寸為0，再延遲一次
                if (pitchContainer.clientWidth === 0 || pitchContainer.clientHeight === 0) {
                    requestAnimationFrame(() => repositionAllPlayers());
                } else {
                    repositionAllPlayers();
                }
            });

            // 為所有圖示綁定拖曳（需要等元素存在後）
            setTimeout(() => {
                formation.positions.forEach(pos => {
                    const playerDiv = document.getElementById(`${pos}-player`);
                    if (playerDiv && !playerDiv.hasAttribute('data-draggable-bound')) {
                        makeDraggable(playerDiv, pos);
                        playerDiv.setAttribute('data-draggable-bound', 'true');
                    }
                });
            }, 50);

            // 右側戰術面板
            positionDetailsDiv.innerHTML = '';
            formation.positions.forEach(pos => {
                const info = formation.details[pos];
                positionDetailsDiv.innerHTML += `
                    <div id="${pos}-info" class="position-info">
                        <h3>${info.name}</h3>
                        <p><strong>戰術要求:</strong> ${info.tactics}</p>
                        <p><strong>技術要求:</strong> ${info.tech}</p>
                        <p><strong>進攻時位置要求:</strong> ${info.off}</p>
                        <p><strong>防守時位置要求:</strong> ${info.def}</p>
                        <p><strong>代表球員:</strong> ${info.example}</p>
                    </div>
                `;
            });

            if (formation.positions.length) showPositionDetails(formation.positions[0]);
            updatePitchAndSubs();
        }

        function updatePitchAndSubs() {
            const formation = formations[currentFormation];
            const selectedSet = new Set();
            formation.positions.forEach(pos => {
                const playerDiv = document.getElementById(`${pos}-player`);
                const playerName = selectedPlayers[pos] || "";
                if (playerDiv) playerDiv.textContent = playerName || pos.toUpperCase();
                if (playerName) selectedSet.add(playerName);
            });
            const subs = players.filter(p => !selectedSet.has(p));
            subsListDiv.innerHTML = subs.map(p => `<p>${p}</p>`).join('');
        }

        function showPositionDetails(pos) {
            document.querySelectorAll('.position-info').forEach(el => el.style.display = 'none');
            const target = document.getElementById(`${pos}-info`);
            if (target) target.style.display = 'block';
        }

        // ---------- 手機/電腦版切換功能 ----------
        let currentLayout = 'auto';
        function setLayoutMode(mode) {
            currentLayout = mode;
            document.body.classList.remove('force-mobile', 'force-desktop');
            if (mode === 'mobile') document.body.classList.add('force-mobile');
            else if (mode === 'desktop') document.body.classList.add('force-desktop');
            localStorage.setItem('layoutMode', mode);
            document.getElementById('btn-auto').classList.toggle('active', mode === 'auto');
            document.getElementById('btn-mobile').classList.toggle('active', mode === 'mobile');
            document.getElementById('btn-desktop').classList.toggle('active', mode === 'desktop');
            // 重新定位圖示（佈局改變後容器尺寸會變）
            requestAnimationFrame(() => repositionAllPlayers());
        }

        // 監聽視窗大小改變，重新定位圖示
        function initResizeListener() {
            window.addEventListener('resize', () => {
                // 使用 requestAnimationFrame 避免頻繁計算
                requestAnimationFrame(() => repositionAllPlayers());
            });
        }

        // 事件綁定
        formationSelect.onchange = () => {
            const newForm = formationSelect.value;
            if (newForm === currentFormation) return;
            updateFormationToCloud(newForm);
        };
        document.getElementById('btn-auto').addEventListener('click', () => setLayoutMode('auto'));
        document.getElementById('btn-mobile').addEventListener('click', () => setLayoutMode('mobile'));
        document.getElementById('btn-desktop').addEventListener('click', () => setLayoutMode('desktop'));

        // 載入上次佈局偏好
        const savedLayout = localStorage.getItem('layoutMode');
        if (savedLayout && ['auto', 'mobile', 'desktop'].includes(savedLayout)) setLayoutMode(savedLayout);
        else setLayoutMode('auto');

        // 圖片錯誤處理
        const imgTest = new Image();
        imgTest.src = 'https://raw.githubusercontent.com/caneswst/Falcon352/refs/heads/main/football_pitch.jpg';
        imgTest.onerror = () => {
            document.getElementById('pitch-error').style.display = 'block';
        };

        // 啟動
        initResizeListener();
        loadFromCloud();
    </script>
</body>
</html>
