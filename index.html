    function getDisciplineStore() { if(!cloudDataCache.discipline) cloudDataCache.discipline = { workers:{}, reserve:{} }; const key = currentRoster; if(!cloudDataCache.discipline[key]) cloudDataCache.discipline[key] = {}; return cloudDataCache.discipline[key]; }
    function isPlayerSuspended(name) { const s = getDisciplineStore()[name] || {yellow:0,red:0}; return s.yellow>=3 || s.red>=1; }
    function updatePlayerCards(name, deltaY, deltaR) { const store = getDisciplineStore(); if(!store[name]) store[name]={yellow:0,red:0}; let ny = Math.max(0, store[name].yellow+deltaY); let nr = Math.max(0, store[name].red+deltaR); store[name] = {yellow:ny, red:nr}; if((ny>=3||nr>=1) && (deltaY>0||deltaR>0)) alert(`⚠️ 停賽警告：${name} 累計黃牌${ny}／紅牌${nr}，需停賽1場！`); saveToCloud().then(()=>{ renderLeftDiscipline(); renderSubsWithCards(); rebuildUI(); }); }
    function resetPlayerDiscipline(name) { const store = getDisciplineStore(); if(store[name]) store[name]={yellow:0,red:0}; saveToCloud().then(()=>{ renderLeftDiscipline(); renderSubsWithCards(); rebuildUI(); alert(`${name} 牌數已清零`); }); }
    function resetAllDiscipline() { const store = getDisciplineStore(); activePlayers.forEach(p=> store[p]={yellow:0,red:0}); saveToCloud().then(()=>{ renderLeftDiscipline(); renderSubsWithCards(); rebuildUI(); alert(`已清除當前賽事所有球員牌數`); }); }

    function renderLeftDiscipline() {
        if(!cloudDataCache) return;
        const store = getDisciplineStore();
        let html = '';
        for(let p of activePlayers) {
            const d = store[p] || {yellow:0,red:0};
            const suspend = (d.yellow>=3 || d.red>=1) ? ' ⚠️停賽' : '';
            html += `<div class="disc-row">
                <span class="disc-name">${escapeHtml(p)}${suspend}</span>
                <div class="disc-buttons">
                    <span class="badge-yellow">🟨${d.yellow}</span>
                    <button class="card-mini-btn" data-player="${escapeHtml(p)}" data-type="yellow" data-delta="1">+1</button>
                    <button class="card-mini-btn" data-player="${escapeHtml(p)}" data-type="yellow" data-delta="-1">-1</button>
                    <span class="badge-red">🟥${d.red}</span>
                    <button class="card-mini-btn" data-player="${escapeHtml(p)}" data-type="red" data-delta="1">+1</button>
                    <button class="card-mini-btn" data-player="${escapeHtml(p)}" data-type="red" data-delta="-1">-1</button>
                    <button class="reset-mini" data-player="${escapeHtml(p)}">🗑️</button>
                </div>
            </div>`;
        }
        leftDisciplineDiv.innerHTML = html;
        document.querySelectorAll('#compact-discipline-list .card-mini-btn').forEach(btn=>{
            btn.addEventListener('click',(e)=>{
                e.stopPropagation();
                const player = btn.dataset.player, type=btn.dataset.type, delta=parseInt(btn.dataset.delta);
                if(type==='yellow') updatePlayerCards(player, delta, 0);
                else updatePlayerCards(player, 0, delta);
            });
        });
        document.querySelectorAll('#compact-discipline-list .reset-mini').forEach(btn=>{
            btn.addEventListener('click',(e)=>{ e.stopPropagation(); resetPlayerDiscipline(btn.dataset.player); });
        });
    }

    function renderSubsWithCards() {
        const form = currentFormations[currentFormationKey];
        if(!form) return;
        const selectedSet = new Set(Object.values(selectedPlayers).filter(v=>v && v!=='待補'));
        const subs = activePlayers.filter(p=>!selectedSet.has(p));
        const store = getDisciplineStore();
        subsListDiv.innerHTML = subs.map(p=>{
            const d = store[p] || {yellow:0,red:0};
            const suspended = (d.yellow>=3 || d.red>=1);
            return `<div style="display:flex; align-items:center; justify-content:space-between; background:#fef5e7; margin-bottom:6px; padding:5px 8px; border-radius:30px;">
                        <span>${escapeHtml(p)} ${suspended ? '<span style="color:#e67e22;">⚠️停賽</span>' : ''}<span class="subs-card-info">🟨${d.yellow} 🟥${d.red}</span></span>
                        <button class="subs-clear-btn" data-name="${escapeHtml(p)}">清空牌</button>
                    </div>`;
        }).join('');
        if(subs.length===0) subsListDiv.innerHTML = '<p>所有球員皆在正選名單</p>';
        document.querySelectorAll('.subs-clear-btn').forEach(btn=>{
            btn.addEventListener('click',(e)=>{ resetPlayerDiscipline(btn.dataset.name); });
        });
    }

    // 原本的 rebuildUI 要整合後備牌版 & 左側紀律渲染
    function rebuildUI() {
        const form = currentFormations[currentFormationKey];
        if(!form) return;
        positionsContainer.innerHTML = '';
        for(let pos of form.positions){
            let lbl = document.createElement('label'); lbl.textContent = form.details[pos].name+':';
            let sel = document.createElement('select'); sel.id=pos;
            let opts = '<option value="">選擇球員</option>';
            for(let p of activePlayers){
                const suspended = isPlayerSuspended(p);
                opts += `<option value="${escapeHtml(p)}" ${selectedPlayers[pos]===p?'selected':''}>${escapeHtml(p)}${suspended?' ⚠️停賽':''}</option>`;
            }
            sel.innerHTML = opts;
            sel.onchange = (e)=>{ selectedPlayers[pos]=e.target.value; updatePlayerToCloud(pos,e.target.value); autoFillPositions(); rebuildUI(); };
            positionsContainer.appendChild(lbl); positionsContainer.appendChild(sel);
        }
        pitchContainer.innerHTML = '';
        for(let pos of form.positions){
            let div = document.createElement('div'); div.className='player'; div.id=`${pos}-player`;
            let dn = selectedPlayers[pos] || pos.toUpperCase(); if(dn.length>8) dn=dn.slice(0,6)+'..';
            div.textContent = dn; pitchContainer.appendChild(div);
        }
        const applyPos = () => {
            if(pitchContainer.clientWidth===0) { requestAnimationFrame(applyPos); return; }
            for(let pos of form.positions){
                let pct = positionsPercent[pos]; if(!pct) continue;
                let {left, top} = percentToPixels(pct.percentX, pct.percentY);
                let pl = document.getElementById(`${pos}-player`);
                if(pl){ pl.style.left=left+'px'; pl.style.top=top+'px'; if(!pl.hasAttribute('data-draggable')){ makeDraggable(pl,pos); pl.setAttribute('data-draggable','true'); } }
            }
        };
        requestAnimationFrame(applyPos);
        positionDetailsDiv.innerHTML = '';
        for(let pos of form.positions){
            let info = form.details[pos];
            positionDetailsDiv.innerHTML += `<div id="${pos}-info" class="position-info"><h3>${info.name}</h3><p><strong>戰術要求:</strong> ${info.tactics}</p><p><strong>技術要求:</strong> ${info.tech}</p><p><strong>進攻:</strong> ${info.off}</p><p><strong>防守:</strong> ${info.def}</p><p><strong>模板:</strong> ${info.example}</p></div>`;
        }
        if(form.positions.length) showPositionDetails(form.positions[0]);
        renderSubsWithCards();
        renderLeftDiscipline();
    }

    // 工具函數 copy 原有
    function percentToPixels(px,py){ let w=pitchContainer.clientWidth, h=pitchContainer.clientHeight; if(w===0||h===0) return {left:0,top:0}; return {left:(px/100)*w, top:(py/100)*h}; }
    function pixelsToPercent(lp,tp){ let w=pitchContainer.clientWidth, h=pitchContainer.clientHeight; if(w===0||h===0) return {percentX:0,percentY:0}; return {percentX:(lp/w)*100, percentY:(tp/h)*100}; }
    async function saveToCloud(){ if(!cloudDataCache||isSaving) return; isSaving=true; try{ if(!cloudDataCache.rosters) cloudDataCache.rosters={workers:{},reserve:{}}; if(!cloudDataCache.rosters[currentRoster]) cloudDataCache.rosters[currentRoster]={currentFormation:currentFormationKey,formations:{}}; cloudDataCache.rosters[currentRoster].currentFormation=currentFormationKey; cloudDataCache.rosters[currentRoster].formations[currentFormationKey]={players:selectedPlayers, coords:positionsPercent}; cloudDataCache.currentRoster=currentRoster; await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(cloudDataCache)}); syncStatusSpan.textContent='✅ 已儲存'; setTimeout(()=>{ if(syncStatusSpan.textContent==='✅ 已儲存') syncStatusSpan.textContent='✅ 已同步雲端'; },1500); }catch(e){ console.error(e); syncStatusSpan.textContent='❌ 儲存失敗'; } finally{ isSaving=false; } }
    function updatePositionToCloud(pos,px,py){ positionsPercent[pos]={percentX:px,percentY:py}; saveToCloud(); }
    function updatePlayerToCloud(pos,name){ selectedPlayers[pos]=name; saveToCloud(); rebuildUI(); }
    function autoFillPositions(){ const form=currentFormations[currentFormationKey]; if(!form) return; let assigned=new Set(Object.values(selectedPlayers).filter(v=>v&&v!=='')); let available=activePlayers.filter(p=>!assigned.has(p)); let idx=0; for(let pos of form.positions){ if(!selectedPlayers[pos]||selectedPlayers[pos]===''){ if(idx<available.length) selectedPlayers[pos]=available[idx++]; else selectedPlayers[pos]='待補'; } } }
    function makeDraggable(el,posKey){ let startX,startY,startLeft,startTop,dragging=false,moved=false; const container=pitchContainer; const onMove=(e)=>{ if(!dragging) return; e.preventDefault(); let cx=e.clientX??(e.touches?.[0]?.clientX??0); let cy=e.clientY??(e.touches?.[0]?.clientY??0); let dx=cx-startX, dy=cy-startY; if(!moved && (Math.abs(dx)>5||Math.abs(dy)>5)) moved=true; if(moved){ let nl=startLeft+dx, nt=startTop+dy; let maxX=container.clientWidth-el.clientWidth, maxY=container.clientHeight-el.clientHeight; nl=Math.min(Math.max(0,nl),maxX); nt=Math.min(Math.max(0,nt),maxY); el.style.left=nl+'px'; el.style.top=nt+'px'; } }; const onUp=()=>{ if(dragging){ dragging=false; window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); window.removeEventListener('touchmove',onMove); window.removeEventListener('touchend',onUp); if(moved){ let lp=parseFloat(el.style.left), tp=parseFloat(el.style.top); if(!isNaN(lp)){ let {percentX,percentY}=pixelsToPercent(lp,tp); updatePositionToCloud(posKey,percentX,percentY); } }else showPositionDetails(posKey); moved=false; } }; const onDown=(e)=>{ e.preventDefault(); let cx=e.clientX??(e.touches?.[0]?.clientX??0); let cy=e.clientY??(e.touches?.[0]?.clientY??0); startX=cx; startY=cy; let rect=el.getBoundingClientRect(), cRect=container.getBoundingClientRect(); startLeft=rect.left-cRect.left; startTop=rect.top-cRect.top; dragging=true; moved=false; window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp); window.addEventListener('touchmove',onMove,{passive:false}); window.addEventListener('touchend',onUp); el.classList.add('dragging'); }; el.addEventListener('mousedown',onDown); el.addEventListener('touchstart',onDown,{passive:false}); }
    function showPositionDetails(pos){ document.querySelectorAll('.position-info').forEach(el=>el.style.display='none'); let t=document.getElementById(`${pos}-info`); if(t) t.style.display='block'; }
    async function switchRoster(rt){ if(rt===currentRoster) return; if(cloudDataCache){ if(!cloudDataCache.rosters[currentRoster]) cloudDataCache.rosters[currentRoster]={currentFormation:currentFormationKey,formations:{}}; cloudDataCache.rosters[currentRoster].currentFormation=currentFormationKey; cloudDataCache.rosters[currentRoster].formations[currentFormationKey]={players:selectedPlayers,coords:positionsPercent}; await saveToCloud(); } currentRoster=rt; if(currentRoster==='workers'){ currentFormations=sevenFormations; activePlayers=[...WORKERS_CUP_PLAYERS]; document.body.classList.remove('roster-reserve'); document.body.classList.add('roster-workers'); formationSelect.innerHTML='<option value="321">3-2-1 (7人)</option><option value="312">3-1-2</option><option value="231">2-3-1</option>'; currentFormationKey='321'; } else { currentFormations=elevenFormations; activePlayers=[...CUP_2026_PLAYERS]; document.body.classList.remove('roster-workers'); document.body.classList.add('roster-reserve'); formationSelect.innerHTML='<option value="442">4-4-2 (平行)</option><option value="4231">4-2-3-1</option><option value="451">4-5-1 (穩守433變體)</option>'; currentFormationKey='451'; } formationSelect.value=currentFormationKey; const rosterData=cloudDataCache?.rosters?.[currentRoster]||{}; if(rosterData.currentFormation && currentFormations[rosterData.currentFormation]) currentFormationKey=rosterData.currentFormation; formationSelect.value=currentFormationKey; const fd=rosterData.formations?.[currentFormationKey]; if(fd && fd.players){ selectedPlayers={...fd.players}; positionsPercent={...fd.coords}; } else { selectedPlayers={}; positionsPercent={}; const lay=currentFormations[currentFormationKey].layout; for(let p of currentFormations[currentFormationKey].positions) positionsPercent[p]={percentX:lay[p].left, percentY:lay[p].top}; } autoFillPositions(); rebuildUI(); saveToCloud(); }
    function updateFormation(val){ if(val===currentFormationKey) return; currentFormationKey=val; const lay=currentFormations[currentFormationKey].layout; for(let p of currentFormations[currentFormationKey].positions) if(!positionsPercent[p]) positionsPercent[p]={percentX:lay[p].left, percentY:lay[p].top}; const oldSel={...selectedPlayers}; selectedPlayers={}; for(let p of currentFormations[currentFormationKey].positions) if(oldSel[p]) selectedPlayers[p]=oldSel[p]; autoFillPositions(); saveToCloud(); rebuildUI(); }
    function renderVideoList(videos){ if(!videos||!videos.length){ videoListContainer.innerHTML='<div>📭 暫無影片</div>'; return; } let sorted=[...videos].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)); videoListContainer.innerHTML=sorted.map((v,idx)=>{ let oidx=videos.indexOf(v); return `<div class="video-item"><div><b>${escapeHtml(v.title||'影片')}</b><br><span>${escapeHtml(v.url)}</span></div><div class="video-actions"><a href="${escapeHtml(v.url)}" target="_blank">▶播放</a><button class="delete-video" data-idx="${oidx}">刪除</button></div></div>`; }).join(''); document.querySelectorAll('.delete-video').forEach(btn=>btn.addEventListener('click',async(e)=>{ let idx=parseInt(btn.dataset.idx); if(!isNaN(idx)&&cloudDataCache.videos[idx]){ cloudDataCache.videos.splice(idx,1); await saveToCloud(); renderVideoList(cloudDataCache.videos); } })); }
    async function addVideo(){ if(!cloudDataCache) return; let url=videoUrlInput.value.trim(); if(!url) return alert('請輸入連結'); cloudDataCache.videos.push({ title:videoTitleInput.value.trim()||'影片', url, timestamp:Date.now() }); await saveToCloud(); renderVideoList(cloudDataCache.videos); videoTitleInput.value=''; videoUrlInput.value=''; }
    async function loadFromCloud(){ syncStatusSpan.textContent='📡 載入中...'; try{ const res=await fetch(API_URL,{headers:{'X-Master-Key':API_KEY}}); const data=await res.json(); cloudDataCache=data.record||{}; if(!cloudDataCache.rosters) cloudDataCache.rosters={workers:{},reserve:{}}; if(!cloudDataCache.videos) cloudDataCache.videos=[]; if(!cloudDataCache.discipline) cloudDataCache.discipline={workers:{},reserve:{}}; cloudDataCache.videos=cloudDataCache.videos.filter(v=>v&&v.url); if(cloudDataCache.currentRoster) currentRoster=cloudDataCache.currentRoster; else currentRoster='workers'; if(currentRoster==='workers'){ currentFormations=sevenFormations; activePlayers=[...WORKERS_CUP_PLAYERS]; document.body.classList.add('roster-workers'); formationSelect.innerHTML='<option value="321">3-2-1</option><option value="312">3-1-2</option><option value="231">2-3-1</option>'; currentFormationKey='321'; }else{ currentFormations=elevenFormations; activePlayers=[...CUP_2026_PLAYERS]; document.body.classList.add('roster-reserve'); formationSelect.innerHTML='<option value="442">4-4-2</option><option value="4231">4-2-3-1</option><option value="451">4-5-1</option>'; currentFormationKey='451'; } let rd=cloudDataCache.rosters[currentRoster]||{}; if(rd.currentFormation && currentFormations[rd.currentFormation]) currentFormationKey=rd.currentFormation; formationSelect.value=currentFormationKey; let fd=rd.formations?.[currentFormationKey]; if(fd && fd.players){ selectedPlayers={...fd.players}; positionsPercent={...fd.coords}; }else{ selectedPlayers={}; let lay=currentFormations[currentFormationKey].layout; for(let p of currentFormations[currentFormationKey].positions) positionsPercent[p]={percentX:lay[p].left, percentY:lay[p].top}; } autoFillPositions(); renderVideoList(cloudDataCache.videos); rebuildUI(); syncStatusSpan.textContent='✅ 已同步雲端'; }catch(e){ console.warn(e); cloudDataCache={rosters:{workers:{},reserve:{}}, videos:[], discipline:{workers:{},reserve:{}}}; rebuildUI(); } }
    function setLayoutMode(mode){ document.body.classList.remove('force-mobile','force-desktop'); if(mode==='mobile') document.body.classList.add('force-mobile'); else if(mode==='desktop') document.body.classList.add('force-desktop'); localStorage.setItem('layoutMode',mode); ['auto','mobile','desktop'].forEach(id=>document.getElementById(`btn-${id}`).classList.toggle('active',mode===id)); setTimeout(()=>{ if(pitchContainer) rebuildUI(); },30); }

    formationSelect.onchange = ()=>updateFormation(formationSelect.value);
    document.getElementById('btn-auto').addEventListener('click',()=>setLayoutMode('auto'));
    document.getElementById('btn-mobile').addEventListener('click',()=>setLayoutMode('mobile'));
    document.getElementById('btn-desktop').addEventListener('click',()=>setLayoutMode('desktop'));
    addVideoBtn.addEventListener('click',addVideo);
    rosterWorkersBtn.addEventListener('click',()=>switchRoster('workers'));
    rosterReserveBtn.addEventListener('click',()=>switchRoster('reserve'));
    leftResetAll.addEventListener('click',()=>resetAllDiscipline());
    window.addEventListener('resize',()=>{ if(resizeTimer) clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>{ if(pitchContainer) rebuildUI(); },100); });
    let resizeTimer; setLayoutMode(localStorage.getItem('layoutMode')||'auto');
    loadFromCloud();
</script>
</body>
</html>
