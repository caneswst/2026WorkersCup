                    'rcb': { name: '右後衛 (RCB)', tactics: '防守右側，與左後衛協作穩固防線，適時前插參與進攻。', tech: '頭球 88, 搶斷 90, 傳球 82, 速度 85', off: '前插至中場分球，支援右中場快速推進。', def: '封堵右路進攻，退守補位，快速回防。', example: 'Kyle Walker - 速度快且穩固。' },

                    'cm': { name: '中場 (CM)', tactics: '中場核心，負責組織進攻並積極前插，支援邊路和前鋒。', tech: '傳球 88, 搶斷 85, 視野 90, 速度 88', off: '前插至對方禁區邊緣，分球至邊路或直接射門。', def: '高位壓迫對方中場，快速回防保護後衛。', example: 'Luka Modrić - 技術全面且積極。' },
                    'rm': { name: '右中場 (RM)', tactics: '負責右路進攻主導，快速前插並壓迫對方防線，提供場地寬度。', tech: '傳中 88, 速度 92, 盤帶 90, 體力 90', off: '快速前插至對方禁區邊緣，傳中或內切射門。', def: '高位壓迫對方左後衛，快速回防協助右後衛。', example: 'Bukayo Saka - 速度快且出色。' },
                    'st': { name: '前鋒 (ST)', tactics: '進攻終結者，積極壓迫對方後衛，尋找空位得分機會。', tech: '射門 92, 速度 90, 位置感 92, 搶點 90', off: '位於禁區前沿，接應邊路傳球或直接射門。', def: '高位壓迫對方中後衛，爭搶第一落點。', example: 'Harry Kane - 射門效率高。' }
                }
            }
        };

        // 全域變數
        let currentFormation = '321';
        let selectedPlayers = {};
        let positionsPercent = {};
        let isRemoteUpdate = false;
        let cloudDataCache = null;
        let resizeTimer = null;
        let isSaving = false;  // 防止同時儲存

        // DOM 元素
        const formationSelect = document.getElementById('formation-select');
        const pitchContainer = document.getElementById('pitch-container');
        const positionsContainer = document.getElementById('positions-container');
        const subsListDiv = document.getElementById('subs-list');
        const positionDetailsDiv = document.getElementById('position-details');
        const syncStatusSpan = document.getElementById('sync-status');
        // 影片相關
        const videoTitleInput = document.getElementById('videoTitleInput');
        const videoUrlInput = document.getElementById('videoUrlInput');
        const addVideoBtn = document.getElementById('addVideoBtn');
        const videoListContainer = document.getElementById('videoListContainer');
        // 圖片相關
        const imageUpload = document.getElementById('imageUpload');
        const uploadImageBtn = document.getElementById('uploadImageBtn');
        const clearImageBtn = document.getElementById('clearImageBtn');
        const sharedImage = document.getElementById('sharedImage');
        const noImageMsg = document.getElementById('noImageMsg');

        // ---------- 輔助函數 ----------
        function percentToPixels(percentX, percentY) {
            const w = pitchContainer.clientWidth;
            const h = pitchContainer.clientHeight;
            if (w === 0 || h === 0) return { left: 0, top: 0 };
            return { left: (percentX / 100) * w, top: (percentY / 100) * h };
        }

        function pixelsToPercent(leftPx, topPx) {
            const w = pitchContainer.clientWidth;
            const h = pitchContainer.clientHeight;
            if (w === 0 || h === 0) return { percentX: 0, percentY: 0 };
            return { percentX: (leftPx / w) * 100, percentY: (topPx / h) * 100 };
        }

        // 渲染影片列表
        function renderVideoList(videos) {
            if (!videos || videos.length === 0) {
                videoListContainer.innerHTML = '<div style="color:#888; text-align:center;">📭 暫無影片，請新增</div>';
                return;
            }
            let html = '';
            videos.forEach((video, index) => {
                const title = video.title && video.title.trim() !== '' ? video.title : '未命名影片';
                const url = video.url || '';
                html += `
                    <div class="video-item">
                        <div class="video-info">
                            <div class="video-title">${escapeHtml(title)}</div>
                            <div class="video-url">${escapeHtml(url)}</div>
                        </div>
                        <div class="video-actions">
                            <a href="${escapeHtml(url)}" target="_blank" class="play-btn">▶ 播放</a>
                            <button class="delete-btn" data-index="${index}">🗑️ 刪除</button>
                        </div>
                    </div>
                `;
            });
            videoListContainer.innerHTML = html;
            // 綁定刪除事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    if (!isNaN(idx) && cloudDataCache && cloudDataCache.videos) {
                        if (confirm('確定要刪除此影片嗎？')) {
                            cloudDataCache.videos.splice(idx, 1);
                            await saveToCloud();
                            renderVideoList(cloudDataCache.videos);
                            syncStatusSpan.textContent = '✅ 已刪除影片';
                            setTimeout(() => {
                                if (syncStatusSpan.textContent === '✅ 已刪除影片') syncStatusSpan.textContent = '✅ 已同步雲端';
                            }, 1500);
                        }
                    }
                });
            });
        }

        // 簡單防 XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 更新圖片UI
        function updateImageUI(base64) {
            if (base64 && base64.startsWith('data:image')) {
                sharedImage.src = base64;
                sharedImage.style.display = 'block';
                noImageMsg.style.display = 'none';
            } else {
                sharedImage.style.display = 'none';
                noImageMsg.style.display = 'block';
                sharedImage.src = '';
            }
        }

        // 儲存圖片至雲端 (Base64)
        async function saveImageToCloud(base64) {
            if (!cloudDataCache) return;
            cloudDataCache.imageBase64 = base64 || '';
            await saveToCloud();
            updateImageUI(base64);
            syncStatusSpan.textContent = '✅ 圖片已儲存';
            setTimeout(() => {
                if (syncStatusSpan.textContent === '✅ 圖片已儲存') syncStatusSpan.textContent = '✅ 已同步雲端';
            }, 1500);
        }

        // 清除圖片
        async function clearImage() {
            if (!cloudDataCache) return;
            cloudDataCache.imageBase64 = '';
            await saveToCloud();
            updateImageUI('');
            syncStatusSpan.textContent = '✅ 圖片已清除';
            setTimeout(() => {
                if (syncStatusSpan.textContent === '✅ 圖片已清除') syncStatusSpan.textContent = '✅ 已同步雲端';
            }, 1500);
        }

        // 新增影片 (改為 async，確保保存完成)
        async function addVideo() {
            if (!cloudDataCache) return;
            const title = videoTitleInput.value.trim();
            let url = videoUrlInput.value.trim();
            if (!url) {
                alert('請輸入 YouTube 連結');
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('請輸入有效的 URL (以 http:// 或 https:// 開頭)');
                return;
            }
            
            // 禁用按鈕，防止重複提交
            addVideoBtn.disabled = true;
            const originalText = addVideoBtn.textContent;
            addVideoBtn.textContent = '儲存中...';
            
            try {
                if (!cloudDataCache.videos) cloudDataCache.videos = [];
                cloudDataCache.videos.push({
                    title: title,
                    url: url,
                    timestamp: Date.now()
                });
                await saveToCloud();  // 等待保存完成
                renderVideoList(cloudDataCache.videos);
                videoTitleInput.value = '';
                videoUrlInput.value = '';
                syncStatusSpan.textContent = '✅ 影片已新增';
                setTimeout(() => {
                    if (syncStatusSpan.textContent === '✅ 影片已新增') syncStatusSpan.textContent = '✅ 已同步雲端';
                }, 1500);
            } catch (err) {
                console.error('新增影片失敗', err);
                alert('儲存失敗，請檢查網絡後再試');
                // 如果儲存失敗，從陣列中移除剛添加的影片
                if (cloudDataCache.videos && cloudDataCache.videos.length > 0) {
                    cloudDataCache.videos.pop();
                }
            } finally {
                addVideoBtn.disabled = false;
                addVideoBtn.textContent = originalText;
            }
        }

        // ---------- 雲端讀寫 ----------
        async function loadFromCloud() {
            syncStatusSpan.textContent = '📡 載入中...';
            try {
                const response = await fetch(API_URL, { headers: { 'X-Master-Key': API_KEY } });
                const data = await response.json();
                cloudDataCache = data.record || {};

                // 確保基礎結構存在
                if (!cloudDataCache.formations) cloudDataCache.formations = {};
                for (let f of ['321', '312', '231']) {
                    if (!cloudDataCache.formations[f]) cloudDataCache.formations[f] = { players: {}, coords: {} };
                }
                
                // 影片列表：處理舊版單一 video 對象，轉為陣列
                if (cloudDataCache.video && !cloudDataCache.videos) {
                    if (cloudDataCache.video.url) {
                        cloudDataCache.videos = [{
                            title: cloudDataCache.video.title || '',
                            url: cloudDataCache.video.url,
                            timestamp: Date.now()
                        }];
                    } else {
                        cloudDataCache.videos = [];
                    }
                    delete cloudDataCache.video;
                } else if (!cloudDataCache.videos) {
                    cloudDataCache.videos = [];
                }
                
                // 確保 videos 是陣列
                if (!Array.isArray(cloudDataCache.videos)) {
                    cloudDataCache.videos = [];
                }
                
                if (cloudDataCache.imageBase64 === undefined) cloudDataCache.imageBase64 = '';

                currentFormation = cloudDataCache.currentFormation || '321';
                formationSelect.value = currentFormation;
                selectedPlayers = { ...cloudDataCache.formations[currentFormation].players };
                positionsPercent = { ...cloudDataCache.formations[currentFormation].coords };

                // 確保每個位置都有百分比
                const layout = formations[currentFormation].layout;
                for (let pos of formations[currentFormation].positions) {
                    if (!positionsPercent[pos] || typeof positionsPercent[pos].percentX !== 'number') {
                        positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
                    }
                }

                renderVideoList(cloudDataCache.videos);
                updateImageUI(cloudDataCache.imageBase64);
                rebuildUI();
                syncStatusSpan.textContent = '✅ 已同步雲端';
            } catch (err) {
                console.error('載入失敗', err);
                syncStatusSpan.textContent = '⚠️ 無法連線雲端，使用本地模式';
                // 使用預設百分比
                const layout = formations[currentFormation].layout;
                for (let pos of formations[currentFormation].positions) {
                    positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
                }
                selectedPlayers = {};
                cloudDataCache = cloudDataCache || { formations: {}, videos: [], imageBase64: '' };
                if (!cloudDataCache.videos) cloudDataCache.videos = [];
                renderVideoList(cloudDataCache.videos);
                rebuildUI();
            }
        }

        async function saveToCloud() {
            if (isRemoteUpdate || !cloudDataCache) return;
            if (isSaving) {
                // 如果正在保存，等待一小段時間後重試
                await new Promise(resolve => setTimeout(resolve, 200));
                if (isSaving) return;
            }
            isSaving = true;
            cloudDataCache.currentFormation = currentFormation;
            cloudDataCache.formations[currentFormation] = { players: selectedPlayers, coords: positionsPercent };
            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                    body: JSON.stringify(cloudDataCache)
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                syncStatusSpan.textContent = '✅ 已儲存';
                setTimeout(() => {
                    if (syncStatusSpan.textContent === '✅ 已儲存') syncStatusSpan.textContent = '✅ 已同步雲端';
                }, 1500);
            } catch (err) {
                console.error('儲存失敗', err);
                syncStatusSpan.textContent = '❌ 儲存失敗';
                throw err;  // 讓呼叫者知道失敗
            } finally {
                isSaving = false;
            }
        }

        function updatePositionToCloud(pos, percentX, percentY) {
            positionsPercent[pos] = { percentX, percentY };
            saveToCloud();
        }

        function updatePlayerToCloud(pos, playerName) {
            selectedPlayers[pos] = playerName;
            saveToCloud();
        }

        function updateFormationToCloud(formationKey) {
            currentFormation = formationKey;
            if (cloudDataCache && cloudDataCache.formations[formationKey]) {
                selectedPlayers = { ...cloudDataCache.formations[formationKey].players };
                positionsPercent = { ...cloudDataCache.formations[formationKey].coords };
            } else {
                selectedPlayers = {};
                positionsPercent = {};
            }
            // 確保百分比存在
            const layout = formations[currentFormation].layout;
            for (let pos of formations[currentFormation].positions) {
                if (!positionsPercent[pos] || typeof positionsPercent[pos].percentX !== 'number') {
                    positionsPercent[pos] = { percentX: layout[pos].left, percentY: layout[pos].top };
                }
            }
            saveToCloud();
            rebuildUI();
        }

        // ---------- 拖曳功能 ----------
        function makeDraggable(element, posKey) {
            let startX = 0, startY = 0;
            let startLeft = 0, startTop = 0;
            let isDragging = false;
            let dragStarted = false;
            let hasMoved = false;
            const container = pitchContainer;

            function onPointerDown(e) {
                e.preventDefault();
                e.stopPropagation();
                const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                startX = clientX;
                startY = clientY;
                const rect = element.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                startLeft = rect.left - containerRect.left;
                startTop = rect.top - containerRect.top;
                element.style.left = startLeft + 'px';
                element.style.top = startTop + 'px';
                isDragging = true;
                dragStarted = false;
                hasMoved = false;
                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);
                window.addEventListener('touchmove', onPointerMove, { passive: false });
                window.addEventListener('touchend', onPointerUp);
                window.addEventListener('touchcancel', onPointerUp);
                element.classList.add('dragging');
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                const dx = clientX - startX;
                const dy = clientY - startY;
                if (!dragStarted && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
                    dragStarted = true;
                    hasMoved = true;
                }
                if (dragStarted) {
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;
                    const containerRect = container.getBoundingClientRect();
                    const elemRect = element.getBoundingClientRect();
                    const maxLeft = containerRect.width - elemRect.width;
                    const maxTop = containerRect.height - elemRect.height;
                    newLeft = Math.min(Math.max(0, newLeft), maxLeft);
                    newTop = Math.min(Math.max(0, newTop), maxTop);
                    element.style.left = newLeft + 'px';
                    element.style.top = newTop + 'px';
                }
            }

            function onPointerUp() {
                if (!isDragging) return;
                isDragging = false;
                element.classList.remove('dragging');
                window.removeEventListener('mousemove', onPointerMove);
                window.removeEventListener('mouseup', onPointerUp);
                window.removeEventListener('touchmove', onPointerMove);
                window.removeEventListener('touchend', onPointerUp);
                window.removeEventListener('touchcancel', onPointerUp);
                if (hasMoved) {
                    const newLeft = parseFloat(element.style.left);
                    const newTop = parseFloat(element.style.top);
                    if (!isNaN(newLeft) && !isNaN(newTop)) {
                        const { percentX, percentY } = pixelsToPercent(newLeft, newTop);
                        updatePositionToCloud(posKey, percentX, percentY);
                    }
                } else {
                    showPositionDetails(posKey);
                }
                hasMoved = false;
                dragStarted = false;
            }

            element.addEventListener('mousedown', onPointerDown);
            element.addEventListener('touchstart', onPointerDown, { passive: false });
        }

        function repositionAllPlayers() {
            const formation = formations[currentFormation];
            if (!formation) return;
            for (let pos of formation.positions) {
                const playerDiv = document.getElementById(`${pos}-player`);
                if (!playerDiv) continue;
                const percent = positionsPercent[pos];
                if (!percent || typeof percent.percentX !== 'number') continue;
                const { left, top } = percentToPixels(percent.percentX, percent.percentY);
                playerDiv.style.left = left + 'px';
                playerDiv.style.top = top + 'px';
            }
        }

        function rebuildUI() {
            const formation = formations[currentFormation];
            if (!formation) return;

            // 左側下拉選單
            positionsContainer.innerHTML = '';
            for (let pos of formation.positions) {
                const label = document.createElement('label');
                label.textContent = formation.details[pos].name + ':';
                const select = document.createElement('select');
                select.id = pos;
                select.innerHTML = '<option value="">選擇球員</option>' + players.map(p => `<option value="${p}">${p}</option>`).join('');
                if (selectedPlayers[pos]) select.value = selectedPlayers[pos];
                select.onchange = (e) => {
                    const newVal = e.target.value;
                    selectedPlayers[pos] = newVal;
                    updatePlayerToCloud(pos, newVal);
                    updatePitchAndSubs();
                };
                positionsContainer.appendChild(label);
                positionsContainer.appendChild(select);
            }

            // 重建球場圖示
            pitchContainer.innerHTML = '<div id="pitch-error" style="display: none;">無法加載足球場圖片</div>';
            for (let pos of formation.positions) {
                const playerDiv = document.createElement('div');
                playerDiv.className = 'player';
                playerDiv.id = `${pos}-player`;
                playerDiv.textContent = selectedPlayers[pos] || pos.toUpperCase();
                pitchContainer.appendChild(playerDiv);
            }

            // 等待 DOM 渲染完成後計算位置
            const applyPositions = () => {
                if (pitchContainer.clientWidth === 0 || pitchContainer.clientHeight === 0) {
                    requestAnimationFrame(applyPositions);
                    return;
                }
                repositionAllPlayers();
                // 綁定拖曳
                for (let pos of formation.positions) {
                    const playerDiv = document.getElementById(`${pos}-player`);
                    if (playerDiv && !playerDiv.hasAttribute('data-draggable-bound')) {
                        makeDraggable(playerDiv, pos);
                        playerDiv.setAttribute('data-draggable-bound', 'true');
                    }
                }
            };
            requestAnimationFrame(applyPositions);

            // 右側戰術面板
            positionDetailsDiv.innerHTML = '';
            for (let pos of formation.positions) {
                const info = formation.details[pos];
                positionDetailsDiv.innerHTML += `
                    <div id="${pos}-info" class="position-info">
                        <h3>${info.name}</h3>
                        <p><strong>戰術要求:</strong> ${info.tactics}</p>
                        <p><strong>技術要求:</strong> ${info.tech}</p>
                        <p><strong>進攻時位置要求:</strong> ${info.off}</p>
                        <p><strong>防守時位置要求:</strong> ${info.def}</p>
                        <p><strong>代表球員:</strong> ${info.example}</p>
                    </div>
                `;
            }

            if (formation.positions.length) showPositionDetails(formation.positions[0]);
            updatePitchAndSubs();
        }

        function updatePitchAndSubs() {
            const formation = formations[currentFormation];
            const selectedSet = new Set();
            for (let pos of formation.positions) {
                const playerDiv = document.getElementById(`${pos}-player`);
                const playerName = selectedPlayers[pos] || "";
                if (playerDiv) playerDiv.textContent = playerName || pos.toUpperCase();
                if (playerName) selectedSet.add(playerName);
            }
            const subs = players.filter(p => !selectedSet.has(p));
            subsListDiv.innerHTML = subs.map(p => `<p>${p}</p>`).join('');
        }

        function showPositionDetails(pos) {
            document.querySelectorAll('.position-info').forEach(el => el.style.display = 'none');
            const target = document.getElementById(`${pos}-info`);
            if (target) target.style.display = 'block';
        }

        // ---------- 手機/電腦版切換 ----------
        let currentLayout = 'auto';
        function setLayoutMode(mode) {
            currentLayout = mode;
            document.body.classList.remove('force-mobile', 'force-desktop');
            if (mode === 'mobile') document.body.classList.add('force-mobile');
            else if (mode === 'desktop') document.body.classList.add('force-desktop');
            localStorage.setItem('layoutMode', mode);
            document.getElementById('btn-auto').classList.toggle('active', mode === 'auto');
            document.getElementById('btn-mobile').classList.toggle('active', mode === 'mobile');
            document.getElementById('btn-desktop').classList.toggle('active', mode === 'desktop');
            requestAnimationFrame(() => repositionAllPlayers());
        }

        function initResizeListener() {
            window.addEventListener('resize', () => {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    repositionAllPlayers();
                }, 100);
            });
        }

        // 事件綁定
        formationSelect.onchange = () => {
            const newForm = formationSelect.value;
            if (newForm === currentFormation) return;
            updateFormationToCloud(newForm);
        };
        document.getElementById('btn-auto').addEventListener('click', () => setLayoutMode('auto'));
        document.getElementById('btn-mobile').addEventListener('click', () => setLayoutMode('mobile'));
        document.getElementById('btn-desktop').addEventListener('click', () => setLayoutMode('desktop'));

        // 影片新增
        addVideoBtn.addEventListener('click', addVideo);

        // 圖片上傳
        uploadImageBtn.addEventListener('click', async () => {
            const file = imageUpload.files[0];
            if (!file) {
                alert('請先選擇圖片檔案');
                return;
            }
            uploadImageBtn.disabled = true;
            const originalText = uploadImageBtn.textContent;
            uploadImageBtn.textContent = '上傳中...';
            try {
                const reader = new FileReader();
                const base64 = await new Promise((resolve, reject) => {
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
                if (base64.length > 2 * 1024 * 1024) {
                    alert('圖片過大，請選擇小於 1MB 的圖片');
                    return;
                }
                await saveImageToCloud(base64);
            } catch (err) {
                alert('讀取圖片失敗');
            } finally {
                uploadImageBtn.disabled = false;
                uploadImageBtn.textContent = originalText;
            }
        });

        clearImageBtn.addEventListener('click', async () => {
            if (confirm('確定要清除共享圖片嗎？')) {
                await clearImage();
                imageUpload.value = '';
            }
        });

        // 載入上次佈局偏好
        const savedLayout = localStorage.getItem('layoutMode');
        if (savedLayout && ['auto', 'mobile', 'desktop'].includes(savedLayout)) setLayoutMode(savedLayout);
        else setLayoutMode('auto');

        // 圖片錯誤處理
        const imgTest = new Image();
        imgTest.src = 'https://raw.githubusercontent.com/caneswst/Falcon352/refs/heads/main/football_pitch.jpg';
        imgTest.onerror = () => {
            document.getElementById('pitch-error').style.display = 'block';
        };

        // 啟動
        initResizeListener();
        loadFromCloud();
    </script>
</body>
</html>
